	<script>
  		const scrollContainer = document.querySelector('.project-scroll');
  		const scrollRow = document.querySelector('.scroll-row');

  		// Original items (før duplisering)
  		const originalItems = Array.from(scrollRow.children);

  		// Dupliser innholdet 3x for loop
  		const originalContent = scrollRow.innerHTML;
  		scrollRow.innerHTML = originalContent + originalContent + originalContent;

  		// Start i midten
  		requestAnimationFrame(() => {
    		const singleWidth = scrollRow.scrollWidth / 3;
    		scrollContainer.scrollLeft = singleWidth;
  		});

  		// Scroll loop logikk
  		scrollContainer.addEventListener('scroll', () => {
    		const singleWidth = scrollRow.scrollWidth / 3;

    		if (scrollContainer.scrollLeft < singleWidth * 0.5) {
      		scrollContainer.scrollLeft += singleWidth;
    		}

    		if (scrollContainer.scrollLeft > singleWidth * 1.5) {
      		scrollContainer.scrollLeft -= singleWidth;
    		}
  		});

  		// IntersectionObserver for captions + video play/pause
  		const observer = new IntersectionObserver(
    		entries => {
      		entries.forEach(entry => {
        		entry.target.classList.toggle('is-active', entry.isIntersecting);

        		const video = entry.target.querySelector('video');
        		if (video) {
          		if (entry.isIntersecting) {
            		video.play().catch(() => {});
          		} else {
            		video.pause();
          		}
        		}
      		});
    		},
    		{
      		root: scrollContainer,
      		threshold: 0.6
    		}
  		);

  		// Observer alle items (etter duplisering)
  		scrollRow.querySelectorAll('.scroll-item').forEach(item => {
    		observer.observe(item);
  		});

  		// PILER
  		const prevBtn = document.querySelector('.scroll-arrow.prev');
  		const nextBtn = document.querySelector('.scroll-arrow.next');

  		if (prevBtn && nextBtn) {
    		const scrollAmount = () => scrollContainer.clientWidth * 0.8;

    		prevBtn.addEventListener('click', () => {
      		scrollContainer.scrollBy({
        		left: -scrollAmount(),
        		behavior: 'smooth'
      		});
    		});

    		nextBtn.addEventListener('click', () => {
      		scrollContainer.scrollBy({
        		left: scrollAmount(),
        		behavior: 'smooth'
      		});
    		});
  		}
	</script>
