	<script>
		const scrollContainer = document.querySelector('.project-scroll');
const scrollRow = document.querySelector('.scroll-row');
const items = scrollRow.querySelectorAll('.scroll-item');

// --- 1. Dupliser innholdet 3x for infinite loop ---
const originalContent = scrollRow.innerHTML;
scrollRow.innerHTML = originalContent + originalContent + originalContent;

// --- 2. Start scroll i midten ---
requestAnimationFrame(() => {
  const singleWidth = scrollRow.scrollWidth / 3;
  scrollContainer.scrollLeft = singleWidth;
});

// --- 3. Infinite scroll med buffer ---
scrollContainer.addEventListener('scroll', () => {
  const singleWidth = scrollRow.scrollWidth / 3;

  // Venstre side
  if (scrollContainer.scrollLeft <= singleWidth * 0.1) {
    scrollContainer.scrollLeft += singleWidth;
  }

  // Høyre side
  if (scrollContainer.scrollLeft >= singleWidth * 1.9) {
    scrollContainer.scrollLeft -= singleWidth;
  }
});

// --- 4. IntersectionObserver for captions ---
const observer = new IntersectionObserver(
  entries => {
    entries.forEach(entry => {
      entry.target.classList.toggle('is-active', entry.isIntersecting);
    });
  },
  {
    root: scrollContainer,
    threshold: 0.6
  }
);

// Observer alle scroll-items
scrollRow.querySelectorAll('.scroll-item').forEach(item => observer.observe(item));

// --- 5. Pil-navigasjon ---
const scrollLeftBtn = document.querySelector('.scroll-left');
const scrollRightBtn = document.querySelector('.scroll-right');

scrollLeftBtn.addEventListener('click', () => {
  scrollContainer.scrollBy({ left: -300, behavior: 'smooth' });
});

scrollRightBtn.addEventListener('click', () => {
  scrollContainer.scrollBy({ left: 300, behavior: 'smooth' });
});

	</script>
